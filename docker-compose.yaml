services:
  acestream:
    image: wafy80/acestream
    container_name: acestream
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "6878:6878"
      - "8621:8621"
    command: >
      --client-console
      --bind-all
      --max-connections 500
      --max-peers 100
      --max-upload-slots 20
      --max-upload-speed 0
      --max-download-speed 0
      --cache-auto 1
      --cache-max-bytes 10737418240
      --live-buffer 30

  acestream-api:
    image: acestream-api
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: acestream-api
    ports:
      - "6877:6877"
    depends_on:
      - acestream
    restart: unless-stopped
    env_file:
      - .env
